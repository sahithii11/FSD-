<!DOCTYPE html>
<html>
<head>
    <title>CSS Color References</title>
    <style>
        .colorName {
            background-color: red;
            color: white;
            padding: 10px;
        }
        .hexColor {
            background-color: #00FF00;
            color: black;
            padding: 10px;
        }
        .rgbColor {
            background-color: rgb(0, 0, 255);
            color: white;
            padding: 10px;
        }
        .rgbaColor {
            background-color: rgba(255, 165, 0, 0.5);
            color: black;
            padding: 10px;
        }
        .hslColor {
            background-color: hsl(300, 100%, 50%);
            color: white;
            padding: 10px;
        }
        .hslaColor {
            background-color: hsla(180, 100%, 50%, 0.4);
            color: black;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Different Ways to Reference Colors in CSS</h2>

    <div class="colorName">This uses Color Name (red)</div><br>
    <div class="hexColor">This uses HEX value (#00FF00)</div><br>
    <div class="rgbColor">This uses RGB (rgb(0,0,255))</div><br>
    <div class="rgbaColor">This uses RGBA (rgba(255,165,0,0.5))</div><br>
    <div class="hslColor">This uses HSL (hsl(300,100%,50%))</div><br>
    <div class="hslaColor">This uses HSLA (hsla(180,100%,50%,0.4))</div>

</body>
</html>
