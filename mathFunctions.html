<!DOCTYPE html>
<html>
<head>
    <title>Number Operations</title>
</head>
<body>

<h2>Number Operations</h2>

Enter a number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

<script>

function factorial(){
    let n = parseInt(document.getElementById("num").value);
    let fact = 1;

    for(let i = 1; i <= n; i++){
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial: " + fact;
}

function fibonacci(){
    let n = parseInt(document.getElementById("num").value);
    let a = 0, b = 1, c;
    let series = "0 1 ";

    for(let i = 2; i < n; i++){
        c = a + b;
        series += c + " ";
        a = b;
        b = c;
    }

    document.getElementById("result").innerHTML = "Fibonacci Series: " + series;
}

function prime(){
    let n = parseInt(document.getElementById("num").value);
    let primes = "";

    for(let i = 2; i <= n; i++){
        let isPrime = true;

        for(let j = 2; j <= i/2; j++){
            if(i % j == 0){
                isPrime = false;
                break;
            }
        }

        if(isPrime){
            primes += i + " ";
        }
    }

    document.getElementById("result").innerHTML = "Prime numbers: " + primes;
}

function palindrome(){
    let n = document.getElementById("num").value;
    let rev = n.split("").reverse().join("");

    if(n == rev){
        document.getElementById("result").innerHTML = n + " is a Palindrome";
    }
    else{
        document.getElementById("result").innerHTML = n + " is not a Palindrome";
    }
}

</script>

</body>
</html>
