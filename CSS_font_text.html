<!DOCTYPE html>
<html>
<head>
<title>CSS Font and Text Properties</title>
<style>
.fontsize{
    font-size: 24px;
}

.fontweight{
    font-weight: bold;
}

.fontstyle{
    font-style: italic;
}

.textdecoration{
    text-decoration: underline;
}

.texttransform{
    text-transform: uppercase;
}

.textalign{
    text-align: center;
}
div{
    margin : 15px;
}
</style>
</head>
<body>
<h2>Demonstration of CSS Font and Text Properties</h2>
<div class="fontsize">This text shows font-size property.</div>
<div class="fontweight">This text shows font-weight property.</div>
<div class="fontstyle">This text shows font-style property.</div>
<div class="textdecoration">This text shows text-decoration property.</div>
<div class="texttransform">This text shows text-transform property.</div>
<div class="textalign">This text shows text-align property.</div>
</body>
</html>
