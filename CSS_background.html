<!DOCTYPE html>
<html>
<head>
<title>Fixed Background Example</title>
<style>
body {
    margin: 0;
    height: 2000px; 
    background-image: url("background.jpg");
    background-repeat: repeat-x; 
    background-position: center 50%; 
    background-attachment: fixed; 
}
 h1{
    text-align : center;
    padding-top: 20px;
}
</style>
</head>
<body>
<h1>Background Image Demonstration</h1>
<p style="text-align : center;">
        Scroll up and down to see that the background image stays fixed and is repeated horizontally halfway down the page.
</p>
</body>
</html>
