<!DOCTYPE html>
<html>
<head>
<title>Week Days using Switch Case</title>
</head>
<body>
<script>
    let day = parseInt(prompt("Enter a number (1-7):"));
    switch(day) {
        case 1:
            document.write("Monday");
            break;
        case 2:
            document.write("Tuesday");
            break;
        case 3:
            document.write("Wednesday");
            break;
        case 4:
            document.write("Thursday");
            break;
        case 5:
            document.write("Friday");
            break;
        case 6:
            document.write("Saturday");
            break;
        case 7:
            document.write("Sunday");
            break;
        default:
            document.write("Invalid input! Please enter a number between 1 and 7.");
    }
</script>
</body>
</html>
